<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="./src/style.css">
  </head>
  <body>
    <img src="./src/assets/n99_logo.png" alt="Logo" class="app-logo" onerror="this.style.display='none'">

    <div class="app-container">
      <div class="folder-header">
        <div class="folder-shoulder"></div>
        <div class="folder-tabs">
          <button class="tab active" data-target="home">Track</button>
          <button class="tab" data-target="history">History</button>
          <button class="tab" data-target="profile">Profile</button>
        </div>
      </div>

      <main class="folder-content">
        
        <section id="home" class="tab-pane active">
          <form id="tracking-form">
            <div class="input-group">
              <label for="movie">Movie name</label>
              <select id="movie" required>
                <option value="" disabled selected>Select option</option>
                <option value="dhurander">Dhurander</option>
                <option value="movie2">Example Movie 2</option>
              </select>
            </div>
            
            <div class="input-group">
              <label for="cinema">Cinema</label>
              <select id="cinema" required>
                <option value="" disabled selected>Select option</option>
                <option value="inox-janak">INOX: Janak Place</option>
                <option value="cinema2">Example Cinema 2</option>
              </select>
            </div>
            
            <div class="input-group">
              <label for="date">Date</label>
              <input type="date" id="date" required />
            </div>
            
            <button type="submit" class="primary-btn">Start Tracking</button>
          </form>
          <p id="movie-status" class="status-msg"></p>
        </section>

        <section id="profile" class="tab-pane">
          <div class="profile-card">
            <div class="profile-header">
              <div class="avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
              </div>  
              <div class="user-info">
                <div class="info-line">-</div>
                <div class="info-line">-</div>
              </div>
            </div>

            <form id="profile-form">
              <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter username" />
              </div>
              
              <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="Enter email address" />
              </div>
              
              <button type="submit" class="primary-btn">Save Profile</button>
            </form>
            <p id="profile-status" class="status-msg"></p>
          </div>
        </section>

        <section id="history" class="tab-pane">
          <div class="history-header">
            <h2 class="history-title">Your Watch History</h2>
            <span class="count-badge">0 films</span>
          </div>
          
          <div class="empty-history">
            <div class="add-circle">
              <span class="plus-icon">+</span>
            </div>
            <h3>No movies tracked yet.</h3>
            <p>Head to <span class="accent-text">Track</span> to add your first!</p>
          </div>

          <ul id="history-list" style="display: none;">
            <!-- Real history items will go here -->
          </ul>
        </section>

      </main>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
